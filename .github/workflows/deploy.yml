name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies and build
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --checksum --delete --exclude='.git' --exclude='node_modules' --exclude='.env' --exclude='database/*.sqlite' --exclude='storage/app/public/*' --exclude='storage/app/backups' --exclude='storage/app/backup_status.json' --exclude='storage/logs/*' --exclude='storage/framework/cache/*' --exclude='storage/framework/sessions/*' --exclude='storage/framework/views/*' --exclude='public/storage'
          path: ./
          remote_path: /var/www/visionboard/
          remote_host: 165.232.161.229
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup database and cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 165.232.161.229
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/visionboard
            chown -R www-data:www-data .
            find . -type f -name "*.sqlite" -exec chmod 664 {} \;
            find . -type d -name "database" -exec chmod 775 {} \;
            chmod -R 775 storage bootstrap/cache
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Ensure Laravel scheduler cron is set up for www-data
            CRON_JOB="* * * * * cd /var/www/visionboard && php artisan schedule:run >> /dev/null 2>&1"
            ( crontab -u www-data -l 2>/dev/null | grep -v 'schedule:run'; echo "$CRON_JOB" ) | crontab -u www-data -

      - name: Health Check
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://visionboard.duonglien.com/login)
          echo "Health check: HTTP $HTTP_STATUS"
