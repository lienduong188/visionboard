name: Restore Database (Manual)

on:
  workflow_dispatch: # Chỉ trigger thủ công

jobs:
  restore:
    name: Restore SQLite Database
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📤 Upload restore.sql + restore script, then run via SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key
          chmod 600 deploy_key
          scp -i deploy_key -P ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no database/restore.sh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/
          echo "Uploaded files"
          ssh -i deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "sh ~/restore.sh && rm ~/restore.sh"
          rm deploy_key
          echo "Done!"

      - name: ✅ Done
        run: echo "Database restored successfully!"
